<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Catálogo Multimídia</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #38bdf8;
            --danger: #ef4444;
            --success: #22c55e;
            --border: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        h1 { color: var(--primary); }
        
        button { padding: 10px 18px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .btn-primary { background-color: var(--primary); color: #0f172a; }
        .btn-danger { background-color: var(--danger); color: white; }
        .btn-edit { background-color: #eab308; color: #0f172a; }
        .btn-success { background-color: var(--success); color: white; width: 100%; margin-top: 10px; }

        /* ÁREA DE FILTROS */
        .filter-bar { display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; background: var(--card-bg); padding: 15px; border-radius: 8px; border: 1px solid var(--border); }
        .filter-bar select, .filter-bar input { padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 6px; font-size: 14px; min-width: 150px; }

        /* GRADE DO CATÁLOGO */
        .catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; }
        .catalog-card { background: var(--card-bg); border-radius: 10px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; position: relative; }
        .catalog-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        
        .card-img { width: 100%; height: 300px; object-fit: cover; background-color: #0f172a; }
        .card-body { padding: 15px; }
        .card-title { font-size: 16px; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .tag { padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; text-transform: uppercase; margin-right: 5px; display: inline-block; color: #0f172a; }
        .tag-filme { background-color: #a855f7; color: white; }
        .tag-livro { background-color: #f97316; color: white; }
        .tag-jogo { background-color: #10b981; color: white; }
        .tag-genre { background-color: var(--border); color: var(--text-muted); }

        /* JANELAS MODAIS (POPUP) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 10; padding: 20px; }
        .modal-content { background: var(--card-bg); padding: 30px; border-radius: 12px; max-width: 600px; width: 100%; border: 1px solid var(--border); position: relative; max-height: 90vh; overflow-y: auto; }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; color: var(--text-muted); }
        .close-modal:hover { color: var(--text); }

        /* Detalhes do Item no Modal */
        .detail-layout { display: flex; gap: 20px; margin-top: 15px; }
        .detail-img { width: 180px; height: 260px; object-fit: cover; border-radius: 6px; background-color: #0f172a; }
        .detail-info { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        .detail-desc { color: var(--text-muted); font-size: 14px; line-height: 1.5; background: var(--bg); padding: 10px; border-radius: 6px; max-height: 150px; overflow-y: auto; }
        .modal-actions { display: flex; gap: 10px; margin-top: 20px; border-top: 1px solid var(--border); padding-top: 15px; }

        /* Estilo do Formulário no Modal */
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 4px; font-size: 14px; font-weight: bold; color: var(--text-muted); }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 6px; }
        .form-group textarea { height: 80px; resize: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🎬 Meu Catálogo</h1>
        <button class="btn-primary" onclick="openFormModal()">➕ Adicionar Item</button>
    </header>

    <div class="filter-bar">
        <select id="filterTipo" onchange="filtrarCatalogo()">
            <option value="todos">Todos os Tipos</option>
            <option value="filme">Filmes</option>
            <option value="livro">Livros</option>
            <option value="jogo">Jogos</option>
        </select>
        <input type="text" id="filterGenero" oninput="filtrarCatalogo()" placeholder="🔍 Filtrar por Gênero (Ex: Ação)...">
    </div>

    <div class="catalog-grid" id="catalogGrid"></div>
</div>

<div class="modal" id="detailModal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal('detailModal')">&times;</span>
        <h2 id="detTitulo">Título do Item</h2>
        <div class="detail-layout">
            <img id="detFoto" class="detail-img" src="" alt="Capa">
            <div class="detail-info">
                <div>
                    <span id="detTipo" class="tag">Tipo</span>
                    <span id="detGenero" class="tag tag-genre">Gênero</span>
                </div>
                <p class="detail-desc" id="detDescricao">Descrição do item...</p>
            </div>
        </div>
        <div class="modal-actions">
            <button class="btn-edit" id="btnEditAction">✏️ Alterar</button>
            <button class="btn-danger" id="btnDeleteAction">🗑️ Excluir</button>
        </div>
    </div>
</div>

<div class="modal" id="formModal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal('formModal')">&times;</span>
        <h2 id="formTitle">Adicionar ao Catálogo</h2>
        <form id="catalogForm" enctype="multipart/form-data" style="margin-top: 15px;">
            <input type="hidden" id="itemId">
            
            <div class="form-group">
                <label for="titulo">Título</label>
                <input type="text" id="titulo" required placeholder="Ex: Inception">
            </div>
            <div class="form-group">
                <label for="tipo">Tipo de Mídia</label>
                <select id="tipo" required>
                    <option value="filme">Filme</option>
                    <option value="livro">Livro</option>
                    <option value="jogo">Jogo</option>
                </select>
            </div>
            <div class="form-group">
                <label for="genero">Gênero</label>
                <input type="text" id="genero" required placeholder="Ex: Ficção Científica, Drama">
            </div>
            <div class="form-group">
                <label for="foto">Capa / Foto (Deixe vazio para manter a atual)</label>
                <input type="file" id="foto" accept="image/*">
            </div>
            <div class="form-group">
                <label for="descricao">Sinopse / Descrição</label>
                <textarea id="descricao" required placeholder="Escreva um resumo aqui..."></textarea>
            </div>
            <button type="submit" class="btn-success" id="btnSubmitForm">Salvar no Catálogo</button>
        </form>
    </div>
</div>

<script>
    const API_URL = 'api.php';
    let todosItens = [];

    document.addEventListener("DOMContentLoaded", fetchItens);

    // Buscar itens do PHP
    async function fetchItens() {
        const response = await fetch(API_URL + '?acao=listar');
        todosItens = await response.json();
        filtrarCatalogo();
    }

    // Renderizar itens na tela com os filtros aplicados
    function filtrarCatalogo() {
        const tipoFiltro = document.getElementById('filterTipo').value;
        const generoFiltro = document.getElementById('filterGenero').value.toLowerCase();
        
        const grid = document.getElementById('catalogGrid');
        grid.innerHTML = '';

        const itensFiltrados = todosItens.filter(item => {
            const bateTipo = (tipoFiltro === 'todos' || item.tipo === tipoFiltro);
            const bateGenero = item.genero.toLowerCase().includes(generoFiltro);
            return bateTipo && bateGenero;
        });

        if (itensFiltrados.length === 0) {
            grid.innerHTML = `<p style="grid-column: 1/-1; text-align:center; color: var(--text-muted);">Nenhum item cadastrado com esses filtros.</p>`;
            return;
        }

        itensFiltrados.forEach(item => {
            // Se a imagem for a padrão, pega um placeholder, senão pega da pasta uploads
            const imgSrc = item.foto === 'padrao.png' ? 'https://placehold.co/300x400/1e293b/f8fafc?text=Sem+Capa' : 'uploads/' + item.foto;
            
            grid.innerHTML += `
                <div class="catalog-card" onclick='openDetailModal(${JSON.stringify(item)})'>
                    <img class="card-img" src="${imgSrc}" alt="${item.titulo}">
                    <div class="card-body">
                        <h3 class="card-title">${item.titulo}</h3>
                        <span class="tag tag-${item.tipo}">${item.tipo}</span>
                        <span class="tag tag-genre">${item.genero.split(',')[0]}</span>
                    </div>
                </div>
            `;
        });
    }

    // Abrir modal de Detalhes (Ver Mais)
    function openDetailModal(item) {
        document.getElementById('detTitulo').innerText = item.titulo;
        document.getElementById('detTipo').innerText = item.tipo;
        document.getElementById('detTipo').className = `tag tag-${item.tipo}`;
        document.getElementById('detGenero').innerText = item.genero;
        document.getElementById('detDescricao').innerText = item.descricao;
        
        const imgSrc = item.foto === 'padrao.png' ? 'https://placehold.co/300x400/1e293b/f8fafc?text=Sem+Capa' : 'uploads/' + item.foto;
        document.getElementById('detFoto').src = imgSrc;

        // Configura ações de alterar/deletar dentro do modal
        document.getElementById('btnEditAction').onclick = () => { closeModal('detailModal'); openFormModal(item); };
        document.getElementById('btnDeleteAction').onclick = () => deleteItem(item.id);

        document.getElementById('detailModal').style.display = 'flex';
    }

    // Abrir modal de Formulário (Adicionar ou Editar)
    function openFormModal(item = null) {
        const form = document.getElementById('catalogForm');
        form.reset();

        if (item) {
            document.getElementById('formTitle').innerText = "✏️ Alterar Item";
            document.getElementById('itemId').value = item.id;
            document.getElementById('titulo').value = item.titulo;
            document.getElementById('tipo').value = item.tipo;
            document.getElementById('genero').value = item.genero;
            document.getElementById('descricao').value = item.descricao;
        } else {
            document.getElementById('formTitle').innerText = "➕ Adicionar ao Catálogo";
            document.getElementById('itemId').value = "";
        }

        document.getElementById('formModal').style.display = 'flex';
    }

    // Fechar qualquer modal
    function closeModal(id) {
        document.getElementById(id).style.display = 'none';
    }

    // Salvar item (Formulário envia arquivos, por isso usa FormData)
    document.getElementById('catalogForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const formData = new FormData();
        formData.append('id', document.getElementById('itemId').value);
        formData.append('titulo', document.getElementById('titulo').value);
        formData.append('tipo', document.getElementById('tipo').value);
        formData.append('genero', document.getElementById('genero').value);
        formData.append('descricao', document.getElementById('descricao').value);
        
        const fotoInput = document.getElementById('foto');
        if (fotoInput.files[0]) {
            formData.append('foto', fotoInput.files[0]);
        }

        const response = await fetch(API_URL + '?acao=salvar', {
            method: 'POST',
            body: formData // Envia o formulário completo incluindo a foto
        });

        const resultado = await response.json();
        if (resultado.status === 'success') {
            Swal.fire('Perfeito!', resultado.message, 'success');
            closeModal('formModal');
            fetchItens();
        } else {
            Swal.fire('Erro!', resultado.message, 'error');
        }
    });

    // Deletar Item
    function deleteItem(id) {
        Swal.fire({
            title: 'Remover do catálogo?',
            text: "Esta ação não pode ser desfeita!",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ef4444',
            cancelButtonColor: '#94a3b8',
            confirmButtonText: 'Sim, excluir!',
            cancelButtonText: 'Cancelar'
        }).then(async (result) => {
            if (result.isConfirmed) {
                const response = await fetch(`${API_URL}?acao=excluir&id=${id}`);
                const resultado = await response.json();
                if (resultado.status === 'success') {
                    Swal.fire('Removido!', resultado.message, 'success');
                    closeModal('detailModal');
                    fetchItens();
                }
            }
        });
    }
</script>
</body>
</html>
