<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex TCG Card Style</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #2f3640;
            color: #fff;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            margin-bottom: 15px;
            font-size: 2rem;
            color: #fbc531;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
        }

        .filters-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .filters-container input, .filters-container select {
            padding: 10px 15px;
            border-radius: 8px;
            border: 2px solid #7f8c8d;
            font-size: 1rem;
            background-color: #f5f6fa;
            color: #2f3640;
            outline: none;
        }

        .filters-container input:focus, .filters-container select:focus {
            border-color: #fbc531;
        }

        /* Grid Principal */
        #pokedex-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            justify-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* --- ESTILO DO CARD DE POKÉMON --- */
        .pokemon-card {
            width: 280px;
            height: 400px;
            border: 12px solid #a6a6a6; /* Borda cinza grossa do TCG */
            border-radius: 14px;
            padding: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            color: #222; /* Texto escuro para contrastar no fundo colorido */
            font-weight: bold;
            position: relative;
        }

        /* Cores de Fundo Dinâmicas baseadas nos Tipos */
        .type-water { background: linear-gradient(180deg, #74b9ff, #2980b9); }
        .type-fire { background: linear-gradient(180deg, #ff7675, #c0392b); }
        .type-grass { background: linear-gradient(180deg, #55efc4, #27ae60); }
        .type-electric { background: linear-gradient(180deg, #ffeaa7, #f39c12); }
        .type-normal { background: linear-gradient(180deg, #dcdde1, #7f8c8d); }
        .type-bug { background: linear-gradient(180deg, #a8b820, #8d9a1b); }
        .type-poison { background: linear-gradient(180deg, #a040a0, #7a307a); }
        .type-ground { background: linear-gradient(180deg, #e0c068, #b89c50); }
        .type-fairy { background: linear-gradient(180deg, #ee99ac, #d47a8f); }
        .type-fighting { background: linear-gradient(180deg, #c03028, #90241e); }
        .type-psychic { background: linear-gradient(180deg, #f85888, #d03a66); }
        .type-rock { background: linear-gradient(180deg, #b8a038, #907c2c); }
        .type-ghost { background: linear-gradient(180deg, #705898, #554374); }
        .type-ice { background: linear-gradient(180deg, #98d8d8, #70b8b8); }
        .type-dragon { background: linear-gradient(180deg, #7038f8, #4c1bc8); }

        /* Fallback para outros tipos */
        .pokemon-card:not([class*="type-"]) { background: linear-gradient(180deg, #bdc3c7, #2c3e50); }

        /* Topo do Card */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
        }

        .card-header .stage {
            font-style: italic;
            font-size: 0.75rem;
            max-width: 120px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .pokemon-name {
            font-size: 1.2rem;
            text-transform: capitalize;
            flex-grow: 1;
            margin-left: 8px;
        }

        .type-badge {
            background: rgba(255,255,255,0.3);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        /* Moldura da Foto */
        .card-image-container {
            background: #e1e1e1;
            border: 4px solid #7f8c8d;
            height: 160px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 4px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
            margin-top: 4px;
        }

        .card-image-container img {
            height: 100%;
            object-fit: contain;
        }

        /* Faixa de Informações Físicas */
        .card-info-bar {
            background: linear-gradient(90deg, #bdc3c7, #95a5a6);
            font-size: 0.65rem;
            text-align: center;
            padding: 3px 0;
            margin-top: 4px;
            border-radius: 2px;
            text-transform: uppercase;
            color: #111;
        }

        /* Corpo de dados (Substituindo os ataques) */
        .card-body {
            background: rgba(255, 255, 255, 0.25);
            border-radius: 6px;
            padding: 10px;
            font-size: 0.8rem;
            flex-grow: 1;
            margin: 8px 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: #111;
        }

        .card-body p {
            line-height: 1.3;
        }

        /* Rodapé do Card (Sem Fraqueza) */
        .card-footer {
            border-top: 1px solid rgba(0,0,0,0.15);
            padding-top: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: #111;
        }
    </style>
</head>
<body>

    <header>
        <h1>Pokédex Digital TCG</h1>
        <div class="filters-container">
            <input type="text" id="search-input" placeholder="Pesquise por nome ou número...">
            
            <select id="type-filter">
                <option value="all">Todos os Tipos</option>
                <option value="water">Água</option>
                <option value="fire">Fogo</option>
                <option value="grass">Planta</option>
                <option value="electric">Elétrico</option>
                <option value="normal">Normal</option>
                <option value="bug">Inseto</option>
                <option value="poison">Venenoso</option>
                <option value="ground">Terrestre</option>
                <option value="fairy">Fada</option>
                <option value="fighting">Lutador</option>
                <option value="psychic">Psíquico</option>
                <option value="rock">Pedra</option>
                <option value="ghost">Fantasma</option>
                <option value="ice">Gelo</option>
                <option value="dragon">Dragão</option>
            </select>

            <select id="gen-filter">
                <option value="all">Todas as Gerações</option>
                <option value="1">1ª Geração</option>
                <option value="2">2ª Geração</option>
                <option value="3">3ª Geração</option>
            </select>
        </div>
    </header>

    <main id="pokedex-grid">
        </main>

    <script>
        const pokedexGrid = document.getElementById('pokedex-grid');
        const searchInput = document.getElementById('search-input');
        const typeFilter = document.getElementById('type-filter');
        const genFilter = document.getElementById('gen-filter');

        let allPokemons = [];

        // Mapeamento de intervalos de id por geração
        const generations = {
            '1': { start: 1, end: 151, label: '1ª Gen' },
            '2': { start: 152, end: 251, label: '2ª Gen' },
            '3': { start: 252, end: 386, label: '3ª Gen' }
        };

        async function fetchPokemons() {
            pokedexGrid.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">Carregando Pokédex...</p>';
            
            const maxPokemon = 151; // Puxa os primeiros 151. Pode aumentar para 386 se quiser mais gerações.
            const promises = [];

            // Requisições em paralelo para carregar mais rápido
            for (let i = 1; i <= maxPokemon; i++) {
                promises.push(
                    fetch(`https://pokeapi.co/api/v2/pokemon/${i}`).then(res => res.json())
                );
            }

            try {
                const pokemonDataResults = await Promise.all(promises);
                
                // Pega os dados de espécies para descobrir evoluções anteriores e descrições
                const speciesPromises = pokemonDataResults.map(p => fetch(p.species.url).then(res => res.json()));
                const speciesDataResults = await Promise.all(speciesPromises);

                allPokemons = pokemonDataResults.map((data, index) => {
                    const speciesData = speciesDataResults[index];
                    
                    let genLabel = '9ª Gen';
                    let genId = '9';
                    for (const [key, value] of Object.entries(generations)) {
                        if (data.id >= value.start && data.id <= value.end) {
                            genLabel = value.label;
                            genId = key;
                            break;
                        }
                    }

                    // Tradução dos tipos para exibição no card
                    const typeTranslations = {
                        water: 'Água', fire: 'Fogo', grass: 'Planta', electric: 'Elétrico',
                        normal: 'Normal', bug: 'Inseto', poison: 'Veneno', ground: 'Terra',
                        fairy: 'Fada', fighting: 'Lutador', psychic: 'Psíquico', rock: 'Pedra',
                        ghost: 'Fantasma', ice: 'Gelo', dragon: 'Dragão'
                    };

                    return {
                        id: data.id,
                        name: data.name,
                        image: data.sprites.other['official-artwork'].front_default || data.sprites.front_default,
                        type: data.types[0].type.name,
                        typeLabel: typeTranslations[data.types[0].type.name] || data.types[0].type.name,
                        generation: genId,
                        genLabel: genLabel,
                        evolutionFrom: speciesData.evolves_from_species ? speciesData.evolves_from_species.name : 'Básico',
                        description: speciesData.flavor_text_entries.find(entry => entry.language.name === 'en')?.flavor_text.replace(/[\n\f]/g, ' ') || 'Sem descrição disponível.'
                    };
                });

                renderGrid(allPokemons);

            } catch (error) {
                console.error(error);
                pokedexGrid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #ff7675;">Erro ao carregar os dados.</p>';
            }
        }

        function renderGrid(pokemons) {
            pokedexGrid.innerHTML = '';
            if (pokemons.length === 0) {
                pokedexGrid.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">Nenhum Pokémon encontrado com estes filtros.</p>';
                return;
            }

            pokemons.forEach(pokemon => {
                const card = document.createElement('div');
                card.classList.add('pokemon-card', `type-${pokemon.type}`);

                const formattedId = String(pokemon.id).padStart(4, '0');
                const stageText = pokemon.evolutionFrom === 'Básico' ? 'BÁSICO' : `Evolução de ${pokemon.evolutionFrom}`;

                card.innerHTML = `
                    <div class="card-header">
                        <span class="stage" title="${stageText}">${stageText.toUpperCase()}</span>
                        <span class="pokemon-name">${pokemon.name}</span>
                        <span class="type-badge">${pokemon.typeLabel}</span>
                    </div>
                    
                    <div class="card-image-container">
                        <img src="${pokemon.image}" alt="${pokemon.name}">
                    </div>

                    <div class="card-info-bar">
                        NO. ${formattedId} | ${pokemon.genLabel}
                    </div>

                    <div class="card-body">
                        <p>${pokemon.description.substring(0, 140)}...</p>
                    </div>

                    <div class="card-footer">
                        <div>Raridade: Comum</div>
                        <div>Recuo: 🌟🌟</div>
                    </div>
                `;
                pokedexGrid.appendChild(card);
            });
        }

        function filterPokemons() {
            const searchTerm = searchInput.value.toLowerCase();
            const selectedType = typeFilter.value;
            const selectedGen = genFilter.value;

            const filtered = allPokemons.filter(pokemon => {
                const matchesSearch = pokemon.name.toLowerCase().includes(searchTerm) || String(pokemon.id).includes(searchTerm);
                const matchesType = selectedType === 'all' || pokemon.type === selectedType;
                const matchesGen = selectedGen === 'all' || pokemon.generation === selectedGen;
                return matchesSearch && matchesType && matchesGen;
            });

            renderGrid(filtered);
        }

        searchInput.addEventListener('input', filterPokemons);
        typeFilter.addEventListener('change', filterPokemons);
        genFilter.addEventListener('change', filterPokemons);

        fetchPokemons();
    </script>
</body>
</html>
