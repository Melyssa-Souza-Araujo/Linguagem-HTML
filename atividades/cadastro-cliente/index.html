<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Clientes</title>
    <style>
        /* Variáveis de cores para facilitar a troca de tema */
        :root {
            --bg-body: #f4f6f9;
            --bg-card: #ffffff;
            --text-color: #333333;
            --text-title: #2c3e50;
            --border-color: #cccccc;
            --table-th: #34495e;
            --table-tr-hover: #f9f9f9;
            --table-border: #eeeeee;
        }

        /* Cores do Tema Escuro */
        [data-theme="dark"] {
            --bg-body: #121212;
            --bg-card: #1e1e1e;
            --text-color: #e0e0e0;
            --text-title: #ffffff;
            --border-color: #444444;
            --table-th: #1f1f1f;
            --table-tr-hover: #2a2a2a;
            --table-border: #333333;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; transition: background-color 0.3s, color 0.3s; }
        body { background-color: var(--bg-body); margin: 0; padding: 20px; color: var(--text-color); }
        .container { max-width: 900px; margin: 0 auto; }
        
        /* Cabeçalho com o botão de tema */
        .header-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { margin: 0; color: var(--text-title); }
        
        /* Botão Tema Escuro */
        .btn-theme { background-color: var(--table-th); color: white; padding: 10px 15px; border-radius: 20px; font-size: 14px; border: 1px solid var(--border-color); }

        /* Formulário */
        .card { background: var(--bg-card); padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 4px; font-size: 14px; background-color: var(--bg-card); color: var(--text-color); }
        
        /* Botões de Ação */
        button { padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s; }
        .btn-success { background-color: #2ecc71; color: white; width: 100%; }
        .btn-success:hover { background-color: #27ae60; }
        .btn-edit { background-color: #3498db; color: white; margin-right: 5px; }
        .btn-edit:hover { background-color: #2980b9; }
        .btn-delete { background-color: #e74c3c; color: white; }
        .btn-delete:hover { background-color: #c0392b; }
        .btn-cancel { background-color: #95a5a6; color: white; width: 100%; margin-top: 5px; display: none; }

        /* Tabela */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: var(--bg-card); border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid var(--table-border); }
        th { background-color: var(--table-th); color: white; }
        tr:hover { background-color: var(--table-tr-hover); }
    </style>
</head>
<body>

<div class="container">
    <div class="header-area">
        <h1>Gerenciador de Clientes</h1>
        <button class="btn-theme" id="themeToggle">🌙 Modo Escuro</button>
    </div>

    <div class="card">
        <h3 id="form-title">Adicionar Novo Cliente</h3>
        <form id="clientForm">
            <input type="hidden" id="clientId">
            <div class="form-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" required placeholder="Ex: João Silva">
            </div>
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" required placeholder="Ex: joao@email.com">
            </div>
            <div class="form-group">
                <label for="telefone">Telefone</label>
                <input type="tel" id="telefone" required placeholder="Ex: (11) 99999-9999">
            </div>
            <button type="submit" class="btn-success" id="btnSave">Salvar Cliente</button>
            <button type="button" class="btn-cancel" id="btnCancel" onclick="clearForm()">Cancelar Edição</button>
        </form>
    </div>

    <div class="card">
        <h3>Clientes Cadastrados</h3>
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>E-mail</th>
                    <th>Telefone</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    const API_URL = 'api.php';

    // ---- LÓGICA DO MODO ESCURO ----
    const themeToggle = document.getElementById('themeToggle');
    
    // Verifica se o usuário já tinha escolhido o modo escuro antes
    const currentTheme = localStorage.getItem('theme');
    if (currentTheme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        themeToggle.innerText = "☀️ Modo Claro";
    }

    // Função que muda o tema ao clicar no botão
    themeToggle.addEventListener('click', () => {
        let theme = document.documentElement.getAttribute('data-theme');
        
        if (theme === 'dark') {
            document.documentElement.removeAttribute('data-theme');
            themeToggle.innerText = "🌙 Modo Escuro";
            localStorage.setItem('theme', 'light');
        } else {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeToggle.innerText = "☀️ Modo Claro";
            localStorage.setItem('theme', 'dark');
        }
    });
    // --------------------------------

    // Carregar os clientes assim que a página abrir
    document.addEventListener("DOMContentLoaded", fetchClientes);

    // Buscar clientes do PHP
    async function fetchClientes() {
        const response = await fetch(API_URL);
        const clientes = await response.json();
        
        const tbody = document.getElementById("tableBody");
        tbody.innerHTML = "";

        if(clientes.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;">Nenhum cliente cadastrado.</td></tr>`;
            return;
        }

        clientes.forEach(cliente => {
            tbody.innerHTML += `
                <tr>
                    <td>${cliente.nome}</td>
                    <td>${cliente.email}</td>
                    <td>${cliente.telefone}</td>
                    <td>
                        <button class="btn-edit" onclick="editCliente(${JSON.stringify(cliente).replace(/"/g, '&quot;')})">Alterar</button>
                        <button class="btn-delete" onclick="deleteCliente(${cliente.id})">Excluir</button>
                    </td>
                </tr>
            `;
        });
    }

    // Adicionar ou Atualizar Cliente
    document.getElementById("clientForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const id = document.getElementById("clientId").value;
        const nome = document.getElementById("nome").value;
        const email = document.getElementById("email").value;
        const telefone = document.getElementById("telefone").value;

        const dados = { nome, email, telefone };
        if (id) dados.id = id;

        const response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(dados)
        });

        const resultado = await response.json();
        alert(resultado.message);
        
        if (resultado.status === "success") {
            clearForm();
            fetchClientes();
        }
    });

    // Preparar formulário para Alteração
    function editCliente(cliente) {
        document.getElementById("clientId").value = cliente.id;
        document.getElementById("nome").value = cliente.nome;
        document.getElementById("email").value = cliente.email;
        document.getElementById("telefone").value = cliente.telefone;

        document.getElementById("form-title").innerText = "Alterar Informações do Cliente";
        document.getElementById("btnSave").innerText = "Atualizar Informações";
        document.getElementById("btnCancel").style.display = "block";
    }

    // Excluir Cliente
    async function deleteCliente(id) {
        if (confirm("Tem certeza que deseja excluir este cliente?")) {
            const response = await fetch(API_URL, {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id })
            });

            const resultado = await response.json();
            alert(resultado.message);
            fetchClientes();
        }
    }

    // Limpar o formulário e resetar estado
    function clearForm() {
        document.getElementById("clientId").value = "";
        document.getElementById("clientForm").reset();
        document.getElementById("form-title").innerText = "Adicionar Novo Cliente";
        document.getElementById("btnSave").innerText = "Salvar Cliente";
        document.getElementById("btnCancel").style.display = "none";
    }
</script>
</body>
</html>
