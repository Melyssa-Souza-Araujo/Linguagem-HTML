<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy Voyages - Agência de Turismo Espacial</title>
    <style>
        :root {
            --bg-gradiente: linear-gradient(135deg, #050508 0%, #111625 100%);
            --bg-card: rgba(21, 25, 40, 0.7);
            --border-card: rgba(255, 255, 255, 0.1);
            --texto-principal: #ffffff;
            --texto-secundario: #b0b3b8;
            --cor-astro: #4ffbdf;
            --sombra: rgba(0, 0, 0, 0.4);
        }
        .modo-claro {
            --bg-gradiente: linear-gradient(135deg, #f0f2f5 0%, #e4e7eb 100%);
            --bg-card: rgba(255, 255, 255, 0.8);
            --border-card: rgba(0, 0, 0, 0.1);
            --texto-principal: #1c1e21;
            --texto-secundario: #606770;
            --cor-astro: #0066cc;
            --sombra: rgba(0, 0, 0, 0.1);
        }

        /* ==========================================================================
           2. ESTILOS GERAIS E ESTRUTURA
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-gradiente);
            color: var(--texto-principal);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.5s ease, color 0.3s ease;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-card);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* Botão de alternar tema com efeito Hover */
        .btn-tema {
            background-color: var(--cor-astro);
            color: #000;
            border: none;
            padding: 10px 20px;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        .btn-tema:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        main {
            flex: 1;
            max-width: 800px;
            width: 100%;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* Banner Hero */
        .hero {
            text-align: center;
            margin-bottom: 40px;
        }

        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, var(--texto-principal), var(--cor-astro));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ==========================================================================
           3. FORMULÁRIO E CARD INTERATIVO
           ========================================================================== */
        .card-simulador {
            background: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 8px 32px var(--sombra);
            backdrop-filter: blur(8px); /* Efeito de vidro borrado ao fundo */
        }

        .grupo-campo {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--texto-secundario);
        }

        input[type="text"], select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-card);
            background: rgba(0, 0, 0, 0.05);
            color: var(--texto-principal);
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: var(--cor-astro);
        }

        .btn-enviar {
            width: 100%;
            padding: 14px;
            background-color: var(--cor-astro);
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-enviar:hover {
            filter: brightness(1.2);
        }

        /* Painel de Resultado Oculto */
        .painel-resultado {
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.1);
            border-left: 4px solid var(--cor-astro);
            display: none; /* Controlado pelo JS */
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        footer {
            text-align: center;
            padding: 20px;
            border-top: 1px solid var(--border-card);
            color: var(--texto-secundario);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">🚀 Galaxy Voyages</div>
        <!-- Removido o 'onclick' do HTML seguindo as boas práticas -->
        <button id="botao-tema" class="btn-tema">Alternar Visual</button>
    </header>

    <main>
        <section class="hero">
            <h1>Explore as Fronteiras do Universo</h1>
            <p style="color: var(--texto-secundario);">Reserve o seu assento nos voos comerciais interplanetários mais seguros da galáxia.</p>
        </section>

        <!-- Formulário de Simulação Avançado -->
        <section class="card-simulador">
            <form id="formulario-viagem">
                <div class="grupo-campo">
                    <label for="nome-astronauta">Nome do Passageiro(a):</label>
                    <input type="text" id="nome-astronauta" placeholder="Ex: Neil Armstrong" required>
                </div>

                <div class="grupo-campo">
                    <label for="destino">Destino Espacial:</label>
                    <select id="destino">
                        <option value="lua">Lua (Estadia na Base Artemis)</option>
                        <option value="marte">Marte (Dunas de Olympus Mons)</option>
                        <option value="europa">Europa (Oceanos Congelados de Júpiter)</option>
                    </select>
                </div>

                <button type="submit" class="btn-enviar">Calcular Itinerário</button>
            </form>

            <!-- Painel onde o resultado será injetado -->
            <div id="bloco-resultado" class="painel-resultado"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Galaxy Voyages S.A. Licenciada pela Federação Intergaláctica.</p>
    </footer>

    <!-- ==========================================================================
       4. JAVASCRIPT MODERNO (ORIENTADO A EVENTOS)
       ========================================================================== -->
    <script>
        // Aguarda todo o HTML carregar antes de executar o script para evitar erros de leitura
        document.addEventListener("DOMContentLoaded", () => {
            
            // Mapeamento dos elementos do DOM
            const botaoTema = document.getElementById("botao-tema");
            const formulario = document.getElementById("formulario-viagem");
            const blocoResultado = document.getElementById("bloco-resultado");

            // --- FUNÇÃO 1: Alternar Tema (Modo Escuro / Claro) ---
            botaoTema.addEventListener("click", () => {
                document.body.classList.toggle("modo-claro");
            });

            // --- FUNÇÃO 2: Processar Simulação de Viagem ---
            formulario.addEventListener("submit", (evento) => {
                // Impede que a página recarregue ao enviar o formulário (comportamento padrão)
                evento.preventDefault(); 

                // Resgata os valores atualizados dos campos
                const nome = document.getElementById("nome-astronauta").value.trim();
                const destinoSelecionado = document.getElementById("destino").value;

                // Objeto contendo o banco de dados das viagens (Mais limpo que vários 'if/else')
                const dadosDestinos = {
                    lua: { nome: "Lua", preco: "₿ 12.50", tempo: "3 dias" },
                    marte: { nome: "Marte", preco: "₿ 85.00", tempo: "6 meses" },
                    europa: { nome: "Europa (Lua de Júpiter)", preco: "₿ 210.00", tempo: "1.2 anos" }
                };

                // Recupera os dados específicos do destino escolhido
                const viagem = dadosDestinos[destinoSelecionado];

                // Injeta as informações estruturadas dentro do bloco de resultado
                blocoResultado.innerHTML = `
                    <p style="margin-bottom: 8px;"><strong>Passagem Confirmada!</strong></p>
                    <p>🧑‍🚀 <strong>Astronauta:</strong> ${nome}</p>
                    <p>📍 <strong>Destino:</strong> ${viagem.nome}</p>
                    <p>⏱️ <strong>Tempo de Viagem:</strong> ${viagem.tempo}</p>
                    <p style="color: var(--cor-astro); margin-top: 8px;">💰 <strong>Investimento:</strong> ${viagem.preco} Espaciais</p>
                `;

                // Torna o painel visível na tela
                blocoResultado.style.display = "block";
            });
        });
    </script>
</body>
</html>
